<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1320"/>
      <stop offset="100%" stop-color="#16223A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#3ECBB5"/>
    </linearGradient>
  </defs>
 
  <rect x="0" y="0" width="1000" height="480" rx="32" fill="url(#bgGrad)"/>
 
  <!-- corner frame accents -->
  <g stroke="#3ECBB5" stroke-width="3" fill="none" opacity="0.5">
    <path d="M 20 50 L 20 20 L 50 20"/>
    <path d="M 950 20 L 980 20 L 980 50"/>
    <path d="M 980 430 L 980 460 L 950 460"/>
    <path d="M 50 460 L 20 460 L 20 430"/>
  </g>
 
  <!-- skyline silhouette -->
  <g opacity="0.18" fill="#9AA5BF">
    <rect x="40" y="380" width="30" height="80"/>
    <rect x="80" y="350" width="26" height="110"/>
    <rect x="115" y="395" width="34" height="65"/>
    <rect x="160" y="330" width="24" height="130"/>
    <rect x="195" y="365" width="28" height="95"/>
    <rect x="235" y="345" width="22" height="115"/>
    <rect x="265" y="390" width="30" height="70"/>
  </g>
 
  <!-- binary texture -->
  <g font-family="monospace" font-size="14" fill="#9AA5BF" opacity="0.35">
    <text x="500" y="235">0110</text>
    <text x="855" y="55">1010</text>
    <text x="905" y="205">0101</text>
    <text x="380" y="60">1100</text>
  </g>
 
  <!-- code brackets: full-stack -->
  <text x="250" y="95" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="url(#accentGrad)" opacity="0.9">&lt;/&gt;</text>
 
  <!-- neural network -->
  <g stroke="#3ECBB5" stroke-width="1.6" opacity="0.55">
    <line x1="560" y1="110" x2="620" y2="70"/>
    <line x1="620" y1="70" x2="700" y2="60"/>
    <line x1="700" y1="60" x2="770" y2="100"/>
    <line x1="770" y1="100" x2="820" y2="150"/>
    <line x1="560" y1="110" x2="650" y2="160"/>
    <line x1="650" y1="160" x2="720" y2="190"/>
    <line x1="720" y1="190" x2="770" y2="100"/>
    <line x1="620" y1="70" x2="650" y2="160"/>
    <line x1="650" y1="160" x2="580" y2="180"/>
    <line x1="560" y1="110" x2="580" y2="180"/>
    <line x1="700" y1="60" x2="720" y2="190"/>
  </g>
  <g fill="#FF8A3D">
    <circle cx="560" cy="110" r="7"/>
    <circle cx="700" cy="60" r="7"/>
    <circle cx="820" cy="150" r="7"/>
    <circle cx="720" cy="190" r="7"/>
  </g>
  <g fill="#3ECBB5">
    <circle cx="620" cy="70" r="7"/>
    <circle cx="770" cy="100" r="7"/>
    <circle cx="650" cy="160" r="7"/>
    <circle cx="580" cy="180" r="7"/>
  </g>
 
  <!-- circuit / brain icon -->
  <g transform="translate(860,260)">
    <ellipse cx="0" cy="0" rx="60" ry="46" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <path d="M -26 -14 Q 0 -40 26 -14" stroke="url(#accentGrad)" stroke-width="2.5" fill="none"/>
    <path d="M -26 14 Q 0 34 26 14" stroke="url(#accentGrad)" stroke-width="2.5" fill="none"/>
    <line x1="60" y1="0" x2="100" y2="0" stroke="#3ECBB5" stroke-width="2.5"/>
    <circle cx="105" cy="0" r="5" fill="#3ECBB5"/>
    <line x1="40" y1="40" x2="65" y2="70" stroke="#FF8A3D" stroke-width="2.5"/>
    <circle cx="70" cy="76" r="5" fill="#FF8A3D"/>
    <line x1="-40" y1="-38" x2="-60" y2="-66" stroke="#FF8A3D" stroke-width="2.5"/>
    <circle cx="-64" cy="-72" r="5" fill="#FF8A3D"/>
  </g>
 
  <!-- laptop with code -->
  <g transform="translate(110,230)">
    <rect x="0" y="0" width="280" height="175" rx="14" fill="#111A2C" stroke="#30406A" stroke-width="2.5"/>
    <rect x="18" y="20" width="150" height="10" rx="5" fill="#FF8A3D" opacity="0.85"/>
    <rect x="18" y="45" width="200" height="10" rx="5" fill="#3ECBB5" opacity="0.75"/>
    <rect x="18" y="70" width="110" height="10" rx="5" fill="#F5F1E8" opacity="0.55"/>
    <rect x="18" y="95" width="175" height="10" rx="5" fill="#3ECBB5" opacity="0.55"/>
    <rect x="18" y="120" width="90" height="10" rx="5" fill="#FF8A3D" opacity="0.55"/>
    <rect x="18" y="145" width="60" height="10" rx="5" fill="#F5F1E8" opacity="0.4"/>
    <path d="M -20 175 L 300 175 L 326 213 L -46 213 Z" fill="#0E1726" stroke="#30406A" stroke-width="2.5"/>
  </g>
 
  <!-- floating data chart -->
  <g transform="translate(440,300)">
    <rect x="0" y="55" width="18" height="40" rx="4" fill="#FF8A3D" opacity="0.85"/>
    <rect x="26" y="35" width="18" height="60" rx="4" fill="#3ECBB5" opacity="0.85"/>
    <rect x="52" y="10" width="18" height="85" rx="4" fill="#FF8A3D" opacity="0.85"/>
    <rect x="78" y="45" width="18" height="50" rx="4" fill="#3ECBB5" opacity="0.85"/>
    <polyline points="9,55 35,35 61,10 87,45" fill="none" stroke="#F5F1E8" stroke-width="2" opacity="0.6"/>
  </g>
 
  <!-- gear: systems -->
  <g transform="translate(930,355)" stroke="#3ECBB5" stroke-width="4" fill="none">
    <circle cx="0" cy="0" r="22"/>
    <circle cx="0" cy="0" r="7" fill="#3ECBB5"/>
    <line x1="0" y1="-30" x2="0" y2="-22"/>
    <line x1="0" y1="22" x2="0" y2="30"/>
    <line x1="-30" y1="0" x2="-22" y2="0"/>
    <line x1="22" y1="0" x2="30" y2="0"/>
    <line x1="-21" y1="-21" x2="-15" y2="-15"/>
    <line x1="15" y1="15" x2="21" y2="21"/>
    <line x1="-21" y1="21" x2="-15" y2="15"/>
    <line x1="15" y1="-15" x2="21" y2="-21"/>
  </g>
</svg>
